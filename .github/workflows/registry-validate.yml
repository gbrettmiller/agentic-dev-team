name: Registry Validation

on:
  pull_request:
    paths:
      - 'agents/**'
      - 'skills/**'
      - 'commands/**'
      - 'registry/**'
  push:
    branches:
      - main
    paths:
      - 'agents/**'
      - 'skills/**'
      - 'commands/**'
      - 'registry/**'

jobs:
  validate-registry:
    name: Validate C-DAD Registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for JSON parsing)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run registry validation
        run: bash scripts/validate-registry.sh
